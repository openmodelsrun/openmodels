description: Sarvam AI's compact 2B-parameter language model built from the ground up for Indian languages. Provides best-in-class performance across 10 Indic languages (bn, gu, hi, kn, ml, mr, or, pa, ta, te) alongside English, outperforming larger general-purpose models like Gemma-2-2B and Llama-3.2-3B thanks to careful data curation and an efficient Indic tokenizer. Edge-deployable.
