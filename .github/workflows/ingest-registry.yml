name: Ingest Registry

on:
  push:
    branches:
      - main
    paths:
      - 'models/**'
      - 'providers/**'
      - 'mappings/**'

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout registry
        uses: actions/checkout@v4
        with:
          path: openmodels

      - name: Checkout platform
        uses: actions/checkout@v4
        with:
          repository: openmodels-run/platform
          token: ${{ secrets.PLATFORM_REPO_TOKEN }}
          path: platform

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r platform/workers/requirements.txt

      - name: Run ingestion script
        working-directory: platform/workers/src
        env:
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          REGISTRY_PATH: ${{ github.workspace }}/openmodels
          INGESTION_LOG_LEVEL: INFO
        run: python -m ingestion
